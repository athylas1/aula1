<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title> Formulario de cadatro de pessoas</title>
</head>
<body>
    <h1> Formulário de Cadastro</h1>
</body>
<main>
<form action="/enviar" method="POST">
    <label for="name"> Nome Completo:</label><br>
    <input type="text" id="nome" name="nome" required><br><br>
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email" required><br><br>
    <label for="nascimento">Data de Nascimento:</label><br>
    <input type="date" id="nascimento" name="nascimento" required><br><br>
    <label for="cpf">CPF:</label><br>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" requerid><br><br>
    <label>Gênero:</label><br>
    <input type="radio" id="maculino" name="genero" value="M">
    <label for="masculino">Masculino</label><br>
    <input type="radio" id="feminino" name="genero" value="F">
    <label for="feminino">Feminino</label><br>
    <input type="radio" id="outro" name="genero" value="O">
    <label for="outro">Outro</label><br>
    <button type="submit">enviar dados</button>
    <button type="reset">limpar tudo</button>
</form>
</main>
</body>
</html>
